        provenance_confidence: high
        notes: "Average of T1_Long=0.67s and T_Trans_infill=0.53s; rounded to 0.65s as used in P-58"
      theta_median_Sa:
        value: 2.00
        unit: "g"
        source: {section: "6.2.6.3", table: "Table 6-6", printed_page: 133}
        provenance_confidence: high
        notes: "After enrichment with modelling uncertainty; before enrichment curve visible in Figure 5-25"
      beta_dispersion:
        value: 0.09
        unit: "dimensionless"
        source: {section: "6.2.6.3", table: "Table 6-6", printed_page: 133}
        provenance_confidence: medium
        notes: "REVIEW NEEDED: Very low β=0.09 is unusual. May represent only MSA aleatory dispersion (β_RTR) without β_m added, or may be the output of MLE on limited collapse records. The text states β_m=0.47 is applied separately in SRAMP. If β_collapse shown is pre-β_m, combined would be sqrt(0.09²+0.47²)≈0.48. Use with caution."
      distribution: "lognormal"
    modelling_uncertainty_beta_m:
      value: 0.47
      unit: "dimensionless"
      source: {section: "6.2.6.3", table: "Table 6-6", printed_page: 133}
      provenance_confidence: high
      notes: "β_m applied to EDPs in SRAMP; β_analytical=0.25 (drawings available) + β_CQA=0.4 → combined β_m = sqrt(0.25²+0.4²)≈0.47"
    residual_drift_limit:
