# archetype_fragilities.yaml
# Collapse fragility parameters per archetype + key NRHA-derived structural response summaries
# Source: Jeswani (2021) MASc thesis
#   - NRHA collapse fragilities: Figure 5-25 (printed p. 105) + Table 6-6 (printed p. 133)
#   - Simplified collapse fragilities: Table 5-5 (printed p. 106-107) + Table 6-6 (printed p. 133)
#   - Structural response summary narrative: Section 5.3.2.2 (printed pp. 98-104)
#
# IMPORTANT NOTE ON COLLAPSE FRAGILITY PARAMETERS:
#   Figure 5-25 (Ch5) shows the MSA-MLE fragilities BEFORE enrichment with modelling uncertainty.
#   Table 6-6 (Ch6) shows the FINAL fragility parameters used in P-58 loss estimation, AFTER
#   enrichment. The β values in Table 6-6 are COMBINED uncertainties (aleatory + modelling β_m).
#   The thesis states that β_m for NRHA archetypes with drawings = 0.25; re-designed = 0.40;
#   simplified models already include β_m (further enriched by β = 0.20).
#
# INTENSITY MEASURE: Sa(T_avg) [g] — spectral acceleration at average of directional periods
#   T_avg is the average of T_Longitudinal and T_Transverse (with infill for NRHA archetypes,
#   bare for FRP retrofit).
#
# The β values in Table 6-6 appear to be the final COMBINED dispersions used in P-58,
# which may represent ONLY the MSA uncertainty (not adding β_m again), since β_m is applied
# separately in SRAMP to EDPs. The exact combination method is not fully explicit in the text.
# Treat β from Table 6-6 as the primary fragility dispersion for loss estimation.

schema_version: "1.0"
extraction_date: "2026-06-26"
extractor: "claude-sonnet-4-6 (automated thesis extraction)"

archetype_fragilities:

