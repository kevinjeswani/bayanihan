    provenance_confidence: high
    notes: "Total excluded: 8 buildings"

# ---------------------------------------------------------------------------
# 4. CONSTRUCTION CODE ERAS
# ---------------------------------------------------------------------------
construction_code_eras:
  description: >
    Code era sorting matrix developed by the author based on UPD-ICE (Pacheco et al., 2014;
    Tingatinga E. et al., 2019) and subject matter experts (Lopez, 2018-2020).
    Two-year lag assumed between construction start and NSCP edition implemented.
  source: { section: "4.4.1", table: "Table 4-3", printed_page: 52 }

  eras:
    pre_code:
      label: "Pre-Code"
      code_abbreviation: "Pre"
      nscp_edition: "Pre-1972"
      makati_construction_start_before: 1974
      makati_construction_completion_before: 1975
      qc_construction_completion_before: 1975
      provenance_confidence: high
      notes: ""

    low_code:
      label: "Low-Code"
      code_abbreviation: "Lo"
      nscp_editions: [1972, 1982, 1986]
      makati_construction_start_range: "1974–1993"
      makati_construction_completion_range: "1975–1994"
      qc_construction_completion_range: "1975–1994"
      provenance_confidence: high
      notes: ""

    mid_code:
      label: "Mid-Code"
      code_abbreviation: "Mid"
      nscp_edition: "1992"
      makati_construction_start_range: "1994–2002"
      makati_construction_completion_range: "1995–2003"
      qc_construction_completion_range: "1995–2003"
      provenance_confidence: high
      notes: ""

    high_code:
      label: "High-Code"
      code_abbreviation: "Hi"
      nscp_editions: [2001, 2010, 2015]
      makati_construction_start_from: 2003
      makati_construction_completion_from: 2004
      qc_construction_completion_from: 2004
      provenance_confidence: high
      notes: ""

  date_handling:
    makati_primary_field: "construction start date"
    makati_fallback: "completion date (assumed start = completion - 1 year)"
    qc_primary_field: "construction completion date"
    qc_unknown_date: "labelled 'UNK' and excluded from final analysis"
    lag_years: 2
    lag_source: "Lopez (2018-2020)"
    provenance_confidence: high
    notes: ""

