# ---------------------------------------------------------------------------
# 6. MAKATI INDEX BUILDINGS (ARCHETYPES)
# ---------------------------------------------------------------------------
makati_index_buildings:
  description: >
    Representative index buildings for Makati City seismic risk assessment.
    'Most probable' and 'possible' bounds were defined.
    Extrapolation made from RVS-screened buildings to full inventory.
  source: { section: "4.4.4", table: "Table 4-6", printed_page: 56 }

  key_assumption:
    description: >
      Most 4- and 5-storey (and possibly 3-storey) Makati school buildings are PTMRFs
      (post-tensioned moment frame beams). More accurate for buildings constructed
      from 1993 onwards (Makati GSD, 2018). Non-PT Low-Code buildings identified
      by longitudinal column spacing of ~4 m (vs. ~8 m for Mid-/High-Code).
    source: { section: "4.4.4", printed_page: 56 }
    provenance_confidence: high
    notes: ""

  archetypes:
    C1-L_PreLo:
      archetype_id: "C1-L (Pre/Lo)"
      upd_ice_code: "C1-L"
      code_era: ["Pre-Code", "Low-Code"]
      height_class: "Low-rise"
      stories: "1–2"
      system: "RCMRF (with CHB infill)"
      modelled_in_ch6: true
      modelling_method: "Simplified"
      sorting_rationale: "Construction started pre-1993"
      floor_area_share_most_probable_percent: 1
      source: { section: "4.4.4", table: "Table 4-6", figure: "Figure 4-11", printed_page: 57 }
      provenance_confidence: medium
      notes: "Floor area share read from Figure 4-11 pie chart (~1%)"

    C1-L_MidHi:
      archetype_id: "C1-L (Mid/Hi)"
      upd_ice_code: "C1-L"
      code_era: ["Mid-Code", "High-Code"]
      height_class: "Low-rise"
      stories: "1–2"
      system: "RCMRF (with CHB infill)"
      modelled_in_ch6: true
      modelling_method: "Full NL model"
      sorting_rationale: "Construction 1994+"
      floor_area_share_most_probable_percent: 0.3
      source: { section: "4.4.4", table: "Table 4-6", figure: "Figure 4-11", printed_page: 57 }
      provenance_confidence: medium
      notes: "Floor area share read from Figure 4-11 pie chart (~0.3%)"

    C1-M_PreLo:
      archetype_id: "C1-M (Pre/Lo)"
      upd_ice_code: "C1-M"
      code_era: ["Pre-Code", "Low-Code"]
      height_class: "Mid-rise"
      stories: "3–5"
      system: "RCMRF (with CHB infill)"
      modelled_in_ch6: true
      modelling_method: "Full NL model"
      sorting_rationale: >
        Construction started pre-1993; buildings with longitudinal column spacing
        of ~4 m vs. 8 m (architectural drawings & RVS). Otherwise classified as PTC1-M (Pre/Lo).
        1 old hospital not built by Makati gov't.
      floor_area_share_most_probable_percent: 14
      source: { section: "4.4.4", table: "Table 4-6", figure: "Figure 4-11", printed_page: 57 }
      provenance_confidence: medium
      notes: "Floor area share read from Figure 4-11 pie chart (~14%). Key difference in most-probable vs. possible distribution."

    PTC1-M_PreLo:
      archetype_id: "PTC1-M (Pre/Lo)"
      upd_ice_code: "C1-M"
      code_era: ["Pre-Code", "Low-Code"]
      height_class: "Mid-rise"
      stories: "3–5"
      system: "RCMRF (with CHB infill); possibly with PTB"
      modelled_in_ch6: false
      modelling_method: "Merged (with other archetype)"
      sorting_rationale: >
        Pre: No structural drawings — possibly with PTB; RVS shows large spans & shallow girders.
        Low: Low-Code, but construction starting 1993/94 PTMRFs (Makati GSD, 2018).
      floor_area_share_most_probable_percent: 6
      source: { section: "4.4.4", table: "Table 4-6", figure: "Figure 4-11", printed_page: 57 }
      provenance_confidence: medium
      notes: "Floor area share read from Figure 4-11 pie chart (~6%). Merged in analysis."

    PTC1-M_Mid:
      archetype_id: "PTC1-M (Mid)"
      upd_ice_code: "C1-M"
      code_era: ["Mid-Code"]
      height_class: "Mid-rise"
      stories: "3–5"
      system: "RCMRF (with CHB infill) & PTB"
      modelled_in_ch6: true
      modelling_method: "EDP-proxy method"
      sorting_rationale: "Mid-Code PTMRFs (Makati GSD, 2018)"
      floor_area_share_most_probable_percent: 32
      source: { section: "4.4.4", table: "Table 4-6", figure: "Figure 4-11", printed_page: 57 }
      provenance_confidence: medium
      notes: "Floor area share read from Figure 4-11 pie chart (~32%). Most dominant archetype by floor area."

    PTC1-M_Hi:
      archetype_id: "PTC1-M (Hi)"
      upd_ice_code: "C1-M"
      code_era: ["High-Code"]
      height_class: "Mid-rise"
      stories: "3–6"
      system: "RCMRF (with CHB infill) & PTB"
      modelled_in_ch6: true
      modelling_method: "EDP-proxy method"
      sorting_rationale: "Available structural drawings and confirmed by Makati GSD (2018)"
      floor_area_share_most_probable_percent: 25
      source: { section: "4.4.4", table: "Table 4-6", figure: "Figure 4-11", printed_page: 57 }
      provenance_confidence: medium
      notes: "Floor area share read from Figure 4-11 pie chart (~25%). PTC1-M (Mid) + PTC1-M (Hi) = ~57% of total floor area."

    C4-L_LoMid:
      archetype_id: "C4-L (Lo/Mid)"
      upd_ice_code: "C4-L"
      code_era: ["Low-Code", "Mid-Code"]
      height_class: "Low-rise"
      stories: "2"
      system: "RCMRF (with CHB Infill) transverse shear walls"
      modelled_in_ch6: false
      modelling_method: "Merged"
      sorting_rationale: "Confirmed RCSW by rebar scanning"
      floor_area_share_most_probable_percent: 0.4
      source: { section: "4.4.4", table: "Table 4-6", figure: "Figure 4-11", printed_page: 57 }
      provenance_confidence: medium
      notes: "Floor area share read from Figure 4-11 pie chart (~0.4%)"

    PTC4-M_Lo:
      archetype_id: "PTC4-M (Lo)"
      upd_ice_code: "C4-M"
      code_era: ["Low-Code"]
      height_class: "Mid-rise"
      stories: "4"
      system: "RCMRF (with CHB Infill), PTB, and elevator core RCSW"
      modelled_in_ch6: false
      modelling_method: "Merged"
      sorting_rationale: "Available structural drawings; only 1 building"
      floor_area_share_most_probable_percent: 1
      source: { section: "4.4.4", table: "Table 4-6", figure: "Figure 4-11", printed_page: 57 }
      provenance_confidence: medium
      notes: "Only 1 building in this archetype. Merged in analysis."

    C1-H_Hi:
      archetype_id: "C1-H (Hi)"
      upd_ice_code: "C1-H"
      code_era: ["High-Code"]
      height_class: "High-rise"
