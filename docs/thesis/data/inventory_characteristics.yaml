# Chapter 4: Portfolio Inventory Characteristics
# Source: Jeswani, K.K. (2021). MASc thesis, University of Toronto.
#   "The Seismic Resilience of Critical Spatially-Distributed Building Portfolios"
#   Chapter 4: Makati and Quezon City Public-School Building Stock (pp. 36–64)
#
# Schema: every leaf value uses:
#   value:      <v>
#   unit:       "count | m2 | km2 | PHP/m2 | dimensionless | ..."
#   source:     { section: "4.x", table/figure: "...", printed_page: <n> }
#   provenance_confidence: high | medium | low
#   notes:      ""   # "REVIEW NEEDED: ..." if low

# ---------------------------------------------------------------------------
# 1. PORTFOLIO TOTALS
# ---------------------------------------------------------------------------
portfolio_totals:
  description: "Combined Makati + Quezon City public-school building portfolio"

  total_buildings_approximate:
    value: 1021
    unit: "count"
    source: { section: "4.1.2", printed_page: 39 }
    provenance_confidence: medium
    notes: >
      Text states "over 1,000 buildings". Makati=96, QC=925 (as of Jan 2018
      after demolition removal). 96+925=1021. The thesis says "approximately 925"
      for QC so true total is approximately 1,021. Some sources round to 1,000+.

  total_students_served:
    value: 560000
    unit: "count"
    source: { section: "4.1.2", printed_page: 39 }
    provenance_confidence: medium
    notes: "Text: 'over 560,000 students'. Enrollment years differ: Makati=2017-18, QC=2015-16."

  cities_covered:
    value: ["Makati City", "Quezon City"]
    unit: "dimensionless"
    source: { section: "4.1.2", printed_page: 39 }
    provenance_confidence: high
    notes: ""

