# DPWH-DERIVED UNIT CONSTRUCTION COSTS — Table D-5 (Appendix D.3.2, printed page 302)
# ============================================================
dpwh_unit_costs:
  source:
    section: "Appendix D.3.2"
    table: "Table D-5"
    printed_page: 302
  provenance_confidence: high
  notes: "Unit costs determined using DPWH 2017a/2019a cost estimation manuals; latest labour rates (Kalibrr Advice, 2019; ARCADIS, 2019); 2014 ACEL equipment rental rates inflated to 2020; PHILCON (2019) material prices and productivity rates. Adjusted for 3/4-person crew with PHILCON (2018) productivity rates where noted."

  items:
    concrete_manual_mixing:
      cost: {value: 9062, unit: "PHP/m³"}
      time: {value: 22.2, unit: "MH/m³"}
      notes: "Adjusted for 3/4-person crew with PHILCON (2018) productivity rates"

    formworks:
      cost: {value: 745, unit: "PHP/m²"}
      time: {value: 3.28, unit: "MH/m²"}
      notes: "Includes assembly & stripping; adjusted for 3/4-person crew"

    rebar_works:
      cost: {value: 88, unit: "PHP/kg"}
      time: {value: 0.11, unit: "MH/kg"}
      notes: "Adjusted for 3/4-person crew"

    steel_works:
      cost: {value: 124, unit: "PHP/kg"}
      time: {value: 0.13, unit: "MH/kg"}
      notes: "Includes fabrication & erection; Based on PHILCON 'heavy steelworks'; adjusted for 3/4-person crew"

    ceiling_installation:
