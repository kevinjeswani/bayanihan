# Repair Cost and Repair Time Component Consequence Functions
# Source: Chapter 6 §6.2.3 and Appendix D.3 (Tables D-8, D-9, D-5)
# Thesis: Jeswani, K.K. (2021). The Seismic Resilience of Critical Spatially-Distributed Building Portfolios. MASc Thesis, University of Toronto.
#
# UNITS:
#   Cost θ: thousands of PHP [000 PHP] (median, at reference year 2020)
#   Time θ: man-hours [MH] (median)
#   CV/β: coefficient of variation (used as dispersion; P-58 uses μ≈θ even for lognormal)
#
# ECONOMIES OF SCALE:
#   Q_min: lower quantity bound → below this, (C,T) = θ × (C,T)_max/θ
#   Q_max: upper quantity bound → above this, (C,T) = θ × (C,T)_min/θ
#   Between Q_min and Q_max: linear interpolation
#
# NOTE: P-58 uses mean (μ) ≈ median (θ) even for lognormal distributions.
# This thesis uses actual θ and the same ratios of (C,T)_{max,min}/θ from P-58-3.
# Additional β dispersion enrichment of +0.25 (root sum of squares) applied to all
# distributions to account for further uncertainty (FEMA, 2018a, per Section 6.2.3).
#
# REFERENCE KEY PARAMETERS (Section 6.2.3, Appendix D.3):
#   - P-58-3 costs inflated by factor 1.29 (Jul 2010 → May 2020, CACCI DGS 2020)
#   - Material cost ratio r_mat = 0.37 (Metro Manila vs. San Francisco, lower bound)
#   - Labour cost ratio r_lab = 0.03
#   - Skilled labour rate c_lab = PHP 107/person-hour (including overhead)
#   - Exchange rate: USD 1.0 = PHP 50.8 (May 2020 average)
#   - Post-disaster demand surge factors: 1.1 (C_10 DPWH costs), 1.2 (C_90 DPWH costs)

metadata:
  document: "MASc Thesis Chapter 6 / Appendix D.3"
  author: "Kevin Jeswani"
  year: 2021
  currency: "PHP (Philippine Peso)"
  reference_year: 2020
  cost_unit: "000 PHP (thousands of PHP)"
  time_unit: "MH (man-hours/person-hours)"
  distributions:
    LN: "Lognormal"
    N: "Normal"

