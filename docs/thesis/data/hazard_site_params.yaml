      provenance_confidence: high
      notes: "2% PoE in 50 years — governing for ground-motion selection and spectral matching in this study"
    poe_50yr:
      value: 0.02
      unit: "dimensionless"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
