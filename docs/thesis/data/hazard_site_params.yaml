# Seismic Hazard Site Parameters — Chapter 3
# Source: Jeswani, K.K. (2021). The Seismic Resilience of Critical Spatially-Distributed
#         Building Portfolios. MASc Thesis, University of Toronto.
# Covers: site-class/soil model, target-spectrum anchors (return periods, Vs30 reference),
#         site amplification, rupture-scenario definitions.
# All values from Chapter 3 (printed pages 19–35) unless cross-referenced to Chapter 7.

metadata:
  document: "MASc Thesis Chapter 3: Seismic Hazard Definition"
  author: "Kevin Jeswani"
  year: 2021
  psha_model: "PEM2020 (Peñarubia et al., 2020) via OpenQuake (GEM, 2020b)"
  study_region: "Metro Manila, Philippines — Makati and Quezon City public school portfolios"

# ============================================================
# SECTION 1: TARGET INTENSITY LEVELS (Table 3-1)
# ============================================================
intensity_levels:
  _source:
    section: "3.1.1"
    table: "Table 3-1"
    printed_page: 22

  SLE_frequent:
    label: "Frequent (SLE — Serviceability Level Event)"
    return_period:
      value: 75
      unit: "years"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
      notes: ""
    poe_50yr:
      value: 0.63
      unit: "dimensionless"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
      notes: "63% probability of exceedance in 50 years"
    mafe:
      value: 0.01250
      unit: "per year"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
      notes: "Mean Annual Frequency of Exceedance"
    governing_sources: "Far-fault shallow crustal (PFS, GNW, Lubang) and/or Manila Trench interface; also subduction intraslab events"

  probable:
    label: "Probable"
    return_period:
      value: 175
      unit: "years"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
      notes: ""
    poe_50yr:
      value: 0.30
      unit: "dimensionless"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
      notes: "30% probability of exceedance in 50 years"
    mafe:
      value: 0.00523
      unit: "per year"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
      notes: ""
    governing_sources: "Far-fault shallow crustal and/or subduction interface events"

  DBE_design:
    label: "Design-Level (DBE — Design Basis Earthquake)"
    return_period:
      value: 475
      unit: "years"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
      notes: "10% PoE in 50 years — standard design level; largest hazard contribution: WVF and EVF (near-fault shallow crustal, within 25 km, Mw 6.5–7.75)"
    poe_50yr:
      value: 0.10
      unit: "dimensionless"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
      notes: ""
    mafe:
      value: 0.00210
      unit: "per year"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
      notes: ""
    governing_sources: "Near-fault shallow crustal: WVF, EVF (primary); second cluster: Manila Trench interface/intraslab at 100–150 km, Mw up to 8.0"

  rare:
    label: "Rare"
    return_period:
      value: 975
      unit: "years"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
      notes: ""
    poe_50yr:
      value: 0.05
      unit: "dimensionless"
      source: {section: "3.1.1", table: "Table 3-1", printed_page: 22}
      provenance_confidence: high
