# archetypes.yaml
# Canonical archetype definitions for bayanihan
# Source: Jeswani (2021) MASc thesis, Chapters 4 and 5
# Printed pages: Ch4 pp. 56-63 (Tables 4-6, 4-7); Ch5 pp. 66-73 (Tables 5-1, 5-2, 5-3, 5-5)
# PDF pages: ~83-88 (Ch4), ~92-100 (Ch5)
#
# ARCHETYPE COUNT: 20 unique archetype IDs (including C1-M Pre/Lo FRP retrofit variant)
#   - 5 NRHA-modelled (C1-L Mid/Hi, C1-M Hi, C1-M Mid, C1-M Pre/Lo, C1-M Pre/Lo FRP)
#   - 2 EDP-proxy (PTC1-M Mid, PTC1-M Hi)
#   - 3 Primary-Simplified (C1-L Pre/Lo, C1-H Hi, S1-M Hi)
#   - 5 Secondary-Simplified (CWS-L, S3-L, CHB-L, W-L, N-L)
#   - 5 Merged (no independent model): PC-L, PTC1-M Pre/Lo, PTC4-M Lo, C4-L Lo/Mid, C4-M Mid
#
# Cities: Makati (MKT) and Quezon City (QC) public school portfolios
# Code eras per Table 4-3:
#   Pre-Code:  Construction completion pre-1975 (QC) / start pre-1974 (MKT)  → NSCP pre-1972
#   Low-Code:  Construction completion 1975-1994 / start 1974-1993            → NSCP 1972/1982/1986
#   Mid-Code:  Construction completion 1995-2003 / start 1994-2002            → NSCP 1992
#   High-Code: Construction completion 2004+ / start 2003+                    → NSCP 2001/2010/2015

