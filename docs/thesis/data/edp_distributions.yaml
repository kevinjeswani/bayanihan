# edp_distributions.yaml
# EDP summary statistics per archetype per intensity level
# Source: Jeswani (2021) MASc thesis, Chapter 5, Section 5.3.2.2 (printed pp. 98-104)
#
# ═══════════════════════════════════════════════════════════════
# IMPORTANT: NO TABULATED EDP SUMMARY STATISTICS IN THESIS BODY
# ═══════════════════════════════════════════════════════════════
#
# The thesis does NOT provide tabulated median + dispersion values for EDPs
# (Peak Inter-Storey Drift Ratio PIDR, Residual IDRR, Peak Floor Acceleration PFA,
# Peak Floor Velocity PFV) per archetype per intensity level.
#
# NRHA EDP results are presented GRAPHICALLY ONLY:
#   - Figure 5-20: C1-L (Mid/Hi) EDPs — Soil D, 75/475/2475-year, Directions 1 & 2 (printed p. 99)
#   - Figure 5-21: C1-M (Hi) EDPs — Soil D, 75/475/2475-year, Directions 1 & 2 (printed p. 100)
#   - Figure 5-22: C1-M (Mid) EDPs — Soil D, 75/475/2475-year, Directions 1 & 2 (printed p. 101)
#   - Figure 5-23: C1-M (Pre/Lo) EDPs — Soil D, 75/475/2475-year, Directions 1 & 2 (printed p. 102)
#   - Figure 5-24: C1-M (Pre/Lo) FRP EDPs — Soil D, 75/475/2475-year, Directions 1 & 2 (printed p. 103)
#   Soil C EDP results in Appendix C.5.6 (not extracted here)
#
# EDP SUMMARY FOR SIMPLIFIED ARCHETYPES (C1-L Pre/Lo, C1-H Hi, S1-M Hi, CWS-L, S3-L, CHB-L, W-L, N-L):
#   Generated using FEMA P-58 (2018a) simplified method — medians and dispersions assigned
#   from default P-58 values (which already include β_m for modelling uncertainty).
#   These are also NOT tabulated in the thesis body; they are computed within the SRAMP software
#   at each of the 5 intensity levels as part of the P-58 Monte Carlo simulations.
#
# NARRATIVE EDP SUMMARIES (from Section 5.3.2.2, printed pp. 103-104):
#   These are the only quantitative EDP ranges available from the thesis text:
#
#   C1-M (Hi):
#     PIDR: Mean lower-storey PIDRs 1.5–2% at maximum intensity (2,475-year Soil D)
#     RIDR: Generally below 1% limit at maximum intensity
#     PFA: 0.25–1g on lower floors at 475- to 2,475-year intensities; ~2g at roof level
#
#   C1-L (Mid/Hi) and C1-M (Mid) [grouped in narrative]:
#     PIDR: 1.25–2.5% at maximum intensity (2,475-year)
#     RIDR: < 1% for all but maximum intensity
#     PFA (C1-L Mid/Hi): 0.5–1.25g across all intensities
#     PFA (C1-M Mid): 0.25–0.75g (2nd & 3rd stories); 0.75–1.25g at roof
#
#   C1-M (Pre/Lo):
#     Numerous collapses; EDPs usable for only 1 record at 2,475-year Soil D
#     That surviving record comparable to mean of C1-M (Mid)
#
#   C1-M (Pre/Lo) FRP:
#     Improved PIDR and RIDR vs. Pre/Lo; no drastic change in PFA or PFV
#     (Comparison is not one-to-one; Pre/Lo mean excludes collapsed records)
#
# ADDITIONAL NOTES:
#   - Collapsed records are EXCLUDED from EDP summaries
#   - PIDRs > 10% treated as non-simulated collapse indicator (not included in EDP distribution)
#   - Modelled RIDRs are 1.2–1.6× higher than FEMA P-58 simplified method estimates
#   - PFA spikes due to abrupt stiffness changes are acknowledged but not corrected
#   - EDPs conditioned on 5 return periods: 75, 175, 475, 975, 2475-year (both Soil C and D)
#     Only 75, 475, 2475-year shown in figures
#   - Randomized GM input angles used for all NRHA simulations
#
# ACCESSING RAW EDP DATA:
#   Per Section 5.3.2.2, EDPs for Soil C are in Appendix C.5.6 (not digitized here).
#   Raw per-record EDP distributions (N records per suite) are not published as tables.
#   The graphical figures show scatter plots of individual record responses + mean.
#   If tabulated EDP data is needed, it must be digitized from Figures 5-20 through 5-24
#   or obtained from the author's SRAMP simulation outputs.
#
# STATUS: No tabulated EDP summary statistics available in thesis body or appendix.
#         This file serves as a documented placeholder and extraction metadata record.
#         Future work: digitize EDP figures or obtain from SRAMP output files.

schema_version: "1.0"
extraction_date: "2026-06-26"
extractor: "claude-sonnet-4-6 (automated thesis extraction)"

status: "NO_TABULATED_DATA"
reason: >
  Chapter 5 of the thesis presents NRHA EDP results exclusively as scatter plots in
  Figures 5-20 through 5-24 (printed pp. 99-103). No summary statistics tables exist
  for median PIDR, PIDR dispersion, median PFA, PFA dispersion, median RIDR, or RIDR
  dispersion per archetype per intensity level. Simplified archetype EDPs are computed
  internally by SRAMP (Kinetica Risk, 2019) using FEMA P-58 default values and are
  not tabulated in the thesis. Only qualitative narrative ranges are available from
  Section 5.3.2.2.

