# =============================================================
# TABLE A-4: SPECTRAL MATCHING CHANGE-MEASURE BOUNDS
# =============================================================
spectral_matching_change_measures:
  description: "Acceptable bounds for spectral-matching change measures; SM vs. AS (Amplitude Scaled)"
  reference: "NIST (2011) GCR 11-917-15"
  source: {appendix: "A", table: "Table A-4", printed_page: 219}
  provenance_confidence: high

  parameters:

    delta_PGA:
      type: "Peak Ground Motion"
      description: "Ratio of SM to AS peak ground acceleration"
      lower_bound:
        value: 0.4
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""
      upper_bound:
        value: 1.9
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""

    delta_PGV:
      type: "Peak Ground Motion"
      description: "Ratio of SM to AS peak ground velocity"
      lower_bound:
        value: 0.5
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""
      upper_bound:
        value: 1.7
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""

    delta_PGD:
      type: "Peak Ground Motion"
      description: "Ratio of SM to AS peak ground displacement"
      lower_bound:
        value: 0.5
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""
      upper_bound:
        value: 3.8
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""

    delta_AI:
      type: "Cumulative Squared"
      description: "Ratio of final Arias intensity: AImax,SM / AImax,AS"
      lower_bound:
        value: 0.4
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""
      upper_bound:
        value: 2.0
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""

    delta_CSV:
      type: "Cumulative Squared"
      description: "Ratio of final cumulative squared velocity"
      lower_bound:
        value: 0.4
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""
      upper_bound:
        value: 2.7
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""

    delta_CSD:
      type: "Cumulative Squared"
      description: "Ratio of final cumulative squared displacement"
      lower_bound:
        value: 0.4
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""
      upper_bound:
        value: 7.1
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""

    max_delta_AI_norm:
      type: "Max difference in normalized peak"
      description: "Max difference over time of normalized Arias intensity"
      lower_bound:
        value: 0.0
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""
      upper_bound:
        value: 0.2
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""

    max_delta_CSV_norm:
      type: "Max difference in normalized peak"
      description: "Max difference over time of normalized cumulative squared velocity"
      lower_bound:
        value: 0.0
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""
      upper_bound:
        value: 0.2
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""

    max_delta_CSD_norm:
      type: "Max difference in normalized peak"
      description: "Max difference over time of normalized cumulative squared displacement"
      lower_bound:
        value: 0.0
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""
      upper_bound:
        value: 0.4
        unit: "dimensionless"
        source: {appendix: "A", table: "Table A-4", printed_page: 219}
        provenance_confidence: high
        notes: ""

    delta_IE:
