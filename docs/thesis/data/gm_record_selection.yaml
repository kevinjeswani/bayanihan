# Ground-Motion Record Selection — Appendix A
# Source: Jeswani, K.K. (2021). The Seismic Resilience of Critical Spatially-Distributed
#         Building Portfolios. MASc Thesis, University of Toronto.
# Tables A-2, A-3 (printed pages 216/217 / PDF pages 243/244)
# Table A-4 (printed page 219 / PDF page 246)
#
# PURPOSE: Seed GM records used for spectrally-matched NRHA suites.
# 11 records selected per soil group (10 shallow crustal + 1 subduction interface).
# 9/10 shallow crustal records are pulse-like (velocity pulses from NGA-West2).
# Spectral matching performed with RSPMatchBi (Grant, 2011/2019).
# Reference spectral target: 2,475-year TSa,max (RotD100) per Shahi & Baker (2013).

metadata:
  document: "MASc Thesis Appendix A: Seismic Hazard Definition"
  author: "Kevin Jeswani"
  year: 2021
  appendix: "A"
  tables: ["Table A-2", "Table A-3", "Table A-4"]
  printed_pages: [216, 217, 219]
  pdf_pages: [243, 244, 246]
  nrha_suites:
    - Soil D
    - Soil C
  records_per_suite:
    value: 11
    unit: "records"
    notes: "10 shallow crustal (9 pulse-like + 1 non-pulse) + 1 subduction interface"
  spectral_intensities:
    - {label: "SLE", return_period_yr: 75}
    - {label: "probable", return_period_yr: 175}
    - {label: "DBE", return_period_yr: 475}
    - {label: "rare", return_period_yr: 975}
    - {label: "MCE", return_period_yr: 2475}

