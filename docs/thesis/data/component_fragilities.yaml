# Component Fragility Assignments and Casualty Consequences
# Source: Chapter 6 (§6.2.2) and Appendix D.2.2, Tables D-2 through D-4
# Thesis: Jeswani, K.K. (2021). The Seismic Resilience of Critical Spatially-Distributed Building Portfolios. MASc Thesis, University of Toronto.
# Note on β for CHB components: values in Table D-4 already enriched by additional 0.4 (see Table D-4 footnote)

metadata:
  document: "MASc Thesis Chapter 6"
  author: "Kevin Jeswani"
  year: 2021
  edp_notes:
    PIDR: "Peak inter-storey drift ratio [%]"
    PFA: "Peak floor acceleration [g] — uses EDP of floor ABOVE component"
    PGA: "Peak ground acceleration [g] — used for elevator at ground floor"
  unit_notes:
    EA: "Each (per piece)"
    SF: "Square feet (ft²)"
    LF: "Linear feet (ft)"

