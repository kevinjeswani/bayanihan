# component_quantities.yaml
# Archetypal structural and non-structural component quantity assignments
# Source: Jeswani (2021) MASc thesis, Appendix D, Table D-13 (printed p. 311)
# PDF page: ~338 (printed page 311 + 27 offset)
#
# All component IDs follow the PH.{category}.{name} convention defined in
# docs/reference/pelicun_csv_schema.md and used in bayanihan/data/fragility.csv.
#
# Column headers follow Table D-13:
#   bc_1s: Beam-Column (Ductile/Non-Ductile/PTRC/Steel) — 1-Side
#   bc_2s: Beam-Column — 2-Side
#   steel_splice: Steel Column Splice
#   steel_baseplate: Steel Column Base Plate
#   chb_solid: CHB infill — Solid (unreinforced or reinforced per archetype)
#   chb_perf: CHB infill — Perforated (unreinforced or reinforced per archetype)
#   curtain_wall: Curtain Wall (sq ft panels)
#   ceiling: Suspended Ceiling (250 SF zones; seismic/non-seismic per archetype)
#   fixtures: Ceiling Fixtures (1 EA; seismic/non-seismic per archetype)
#   stairs: CIP RC Stairs (1 EA)
#   elec_dt: Desktop Electronics (1 EA)
#   elec_wm: Wall-Mounted Electronics (1 EA)
#   sprinkler_drop: Sprinkler Drops (100 EA)
#   sprinkler_pipe: Sprinkler Horizontal Piping (1000 LF)
#
# Note on P-58 units:
#   Beam-column joints: quantity = number of joints (1 EA each)
#   CHB: quantity = number of 125 SF panels
#   Ceiling: quantity = number of 250 SF zones
#   Stairs: 1 EA per stair run
#   Electronics: 1 EA each
#   Sprinkler drops: 100 EA
#   Sprinkler piping: 1000 LF
#
# Note on ductility:
#   "Ductile" archetypes (C1-M Hi, C1-M Mid, C1-L Mid/Hi, PTC1-M, S1-M Hi, C1-H Hi,
#    C1-M Pre/Lo FRP) use PH.S.DRCMRF.1S/2S (or PH.S.PTRCMRF/SMRF for PT/Steel).
#   "Non-ductile" archetypes (C1-M Pre/Lo, C1-L Pre/Lo) use PH.S.NDRCMRF.1S/2S.
#   Table D-13 footnote (a) references Table 7-4 for ductile/non-ductile and
#   reinforced/unreinforced CHB assignments.
#
# Note on merged archetypes:
#   PC-L → uses C1-L (Pre/Lo) component model
#   PTC1-M (Pre/Lo) → uses C1-M (Pre/Lo) component model
#   PTC4-M (Lo) → uses PTC1-M (Mid) component model
#   C4-L (Lo/Mid) → uses C1-L (Mid/Hi) component model
#   C4-M (Mid) → uses C1-M (Hi) component model

