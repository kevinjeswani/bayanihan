      unit: "PHP bil."
      source: { section: "E.1.1", figure: "Figure E-1 CDF panel 1", printed_page: 326 }
      provenance_confidence: medium
      notes: "WVF Mw=6.5 Makati. CDF read."
    # Injury CDF: x-axis 0-30 (×1000); injury ratio 0-0.3; median ~3,000-4,000
