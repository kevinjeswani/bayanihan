# portfolio_validation.yaml
# Validation targets extracted from:
#   Jeswani, Kevin Kamlesh (2021). The Seismic Resilience of Critical
#   Spatially-Distributed Building Portfolios. MASc Thesis, University of Toronto.
#
# SCHEMA: Every value entry includes:
#   value: <scalar or list [median, p90]>
#   unit: "<unit string>"
#   source: { section: "...", figure/table: "...", printed_page: <int> }
#   provenance_confidence: high | medium | low
#   notes: ""  (scenario + city; REVIEW NEEDED if low)
#
# TOLERANCE TARGET: Package must reproduce median values within ±20%.
#
# SCENARIOS (5 total; Appendix E covers all except WVF Mw=7.3 which is in Ch7):
#   A: WVF Mw=6.5  (West Valley Fault, near-fault, shallow crustal)
#   B: WVF Mw=7.3  (West Valley Fault, near-fault, shallow crustal) *** PRIMARY TARGET ***
#   C: EVF Mw=6.9  (East Valley Fault, near-fault, shallow crustal)
#         [Appendix E figure labels say "EVF Mw=6.6"; Table 7-1 shows Mw=6.9 as simulation input]
#   D: GNW Mw=7.6  (General Nakar West, far-field 30-45 km, shallow crustal)
#         [Appendix E figure labels and body text say "GNW Mw=7.2"; Table 7-1 shows Mw=7.6]
#   E: MNLT Mw=7.9 (Manila Trench Central, far-field, subduction interface)
#         [Appendix E figure labels and body text say "MNLT Mw=8.15"; Table 7-1 shows Mw=7.9]
#
# NOTE ON MW DISCREPANCY (REVIEW NEEDED):
#   Table 7-1 (p.155, PDF p.182) gives Mw for scenarios D and E as 7.6 and 7.9 respectively.
#   Body text (Sec 7.2.1, p.154) and ALL Appendix E figure headings label them 7.2 (GNW) and 8.15 (MNLT).
#   This is a genuine internal inconsistency in the thesis. The figure-label Mw values (7.2, 8.15) are
#   the characteristic magnitudes (Mchar) cited from Peñarubia et al. (2020); Table 7-1 likely
#   reflects the Mw actually input to the GMPE (possibly rounded differently). The simulation code
#   must resolve which value was actually used. The body text, section labels, and Appendix E
#   all consistently use 7.2 and 8.15 — those are the *scenario identifiers* used throughout the thesis.
#
# CITIES COVERED: Makati City and Quezon City public school building portfolios
#
# PORTFOLIO CONSTANTS:
portfolio_constants:
  makati_replacement_cost:
    value: 10.6
    unit: "PHP bil."
    source: { section: "7.3.1", table: "text", printed_page: 159 }
    provenance_confidence: high
    notes: "Makati total replacement cost (2021 PHP)"
  quezon_city_replacement_cost:
    value: 20.0
    unit: "PHP bil."
    source: { section: "7.3.1", table: "text", printed_page: 159 }
    provenance_confidence: high
    notes: "Quezon City total replacement cost (2021 PHP)"
  makati_population:
    value: 94300
    unit: "students"
    source: { section: "7.3.1", table: "text", printed_page: 159 }
    provenance_confidence: high
    notes: "Makati public school population, as of 2016/2017"
  quezon_city_population:
    value: 466000
    unit: "students"
    source: { section: "7.3.1", table: "text", printed_page: 159 }
    provenance_confidence: high
    notes: "Quezon City public school population, as of 2016/2017"
  monte_carlo_realizations:
    value: 1000
    unit: "realizations"
    source: { section: "7.1", table: "text", printed_page: 152 }
    provenance_confidence: high
    notes: "R=1000 Monte Carlo realizations per scenario"
  spatial_correlation_model:
    value: "Loth and Baker (2013)"
    unit: "—"
    source: { section: "7.1", table: "text", printed_page: 153 }
    provenance_confidence: high
    notes: "CONFIRMED: intra-event residual, multi-period cross-correlation"
  intensity_measure:
    value: "Sa(T1) = Sa(0.5s)"
    unit: "g"
    source: { section: "7.1", table: "Figure 7-3 caption", printed_page: 161 }
    provenance_confidence: high
    notes: "Sa(0.5s) used as portfolio-level IM; buildings assigned site Sa(0.5s)"
  primary_resilience_metric:
    value: "90% portfolio Functional Recovery time"
    unit: "days"
    source: { section: "7.3.4.1", table: "text", printed_page: 162 }
    provenance_confidence: high
    notes: "90th-percentile of portfolio recovered; chosen over 100% due to large tail"

