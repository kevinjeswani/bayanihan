# ============================================================
# NOTES ON OMITTED REGIMES
# ============================================================
omitted_regimes:
  intraslab:
    notes: >
      Subcrustal (intraslab) GMs from the Manila Trench were explicitly omitted from
      the ground-motion selection procedure in this study (§3.2.4, printed p.31).
      No intraslab GMPEs appear in Table 7-3. The thesis notes this as a direction
      for future work.
    source: {section: "3.2.4", table: null, printed_page: 31}

# ============================================================
# SUMMARY COUNT
# ============================================================
summary:
  total_gmpes: 6
  unique_gmpe_references: 6
  note: "Zhao06 appears in both shallow_crustal and subduction_interface branches of the logic tree (counted once as a unique reference, twice as logic-tree entries). CY08 and BA08 are NGA-West1; BSSA14 is NGA-West2."
  shallow_crustal_count: 4
  subduction_interface_count: 4
